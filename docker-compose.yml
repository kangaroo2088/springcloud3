services:
  mysql:
    image: mysql:8.4
    container_name: springcloud3-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: demo_db
      MYSQL_USER: app
      MYSQL_PASSWORD: app
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: springcloud3-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: springcloud3-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  eureka:
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        MODULE: eureka
    container_name: springcloud3-eureka
    ports:
      - "8761:8761"

  user-service:
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        MODULE: user-service
    container_name: springcloud3-user-service
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_started
      eureka:
        condition: service_started
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:8761/eureka
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/demo_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: app
      SPRING_DATASOURCE_PASSWORD: app
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      APP_SECURITY_JWT_SECRET: VJ32as2QWW6FW87WGIueAtMbS1lfD9GBcYOLMF6fIN0=
      APP_KAFKA_TOPIC_PRODUCT_CREATED: product-created
    ports:
      - "8180:8180"

  product-service:
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        MODULE: product-service
    container_name: springcloud3-product-service
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_started
      eureka:
        condition: service_started
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:8761/eureka
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/demo_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: app
      SPRING_DATASOURCE_PASSWORD: app
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      APP_KAFKA_TOPIC_PRODUCT_CREATED: product-created
    ports:
      - "8081:8081"

  order-service:
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        MODULE: order-service
    container_name: springcloud3-order-service
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_started
      eureka:
        condition: service_started
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:8761/eureka
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/demo_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: app
      SPRING_DATASOURCE_PASSWORD: app
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      APP_KAFKA_TOPIC_ORDER_CREATED: order-created
      APP_KAFKA_TOPIC_ORDER_CANCELLED: order-cancelled
      APP_KAFKA_TOPIC_INVENTORY_RESERVED: inventory-reserved
      APP_KAFKA_TOPIC_INVENTORY_REJECTED: inventory-rejected
    ports:
      - "8084:8084"

  inventory-service:
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        MODULE: inventory-service
    container_name: springcloud3-inventory-service
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_started
      eureka:
        condition: service_started
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:8761/eureka
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/demo_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: app
      SPRING_DATASOURCE_PASSWORD: app
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      APP_KAFKA_TOPIC_ORDER_CREATED: order-created
      APP_KAFKA_TOPIC_ORDER_CANCELLED: order-cancelled
      APP_KAFKA_TOPIC_INVENTORY_RESERVED: inventory-reserved
      APP_KAFKA_TOPIC_INVENTORY_REJECTED: inventory-rejected
    ports:
      - "8085:8085"

  ai-assistant-service:
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        MODULE: ai-assistant-service
    container_name: springcloud3-ai-assistant-service
    depends_on:
      eureka:
        condition: service_started
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:8761/eureka
      APP_SECURITY_JWT_SECRET: VJ32as2QWW6FW87WGIueAtMbS1lfD9GBcYOLMF6fIN0=
    ports:
      - "8086:8086"

  api-gateway:
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        MODULE: api-gateway
    container_name: springcloud3-api-gateway
    depends_on:
      eureka:
        condition: service_started
      user-service:
        condition: service_started
      product-service:
        condition: service_started
      order-service:
        condition: service_started
      inventory-service:
        condition: service_started
      ai-assistant-service:
        condition: service_started
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:8761/eureka
    ports:
      - "8183:8183"
